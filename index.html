<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stickman Cotton Collector</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f0f0f0;
        margin: 0;
        padding: 20px;
    }
    #game {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 5px;
        cursor: pointer;
    }
    #stickman {
        font-size: 50px;
        margin: 20px;
    }
</style>
</head>
<body>

<div id="game">
    <h1>Cotton Collector</h1>
    <p><strong>Cotton:</strong> <span id="cotton">0</span></p>
    <button id="collect">Click to Collect Cotton 🌾</button>
    <button id="buyStickman">Buy A Black (Cost: <span id="stickmanCost">10</span> Cotton)</button>
    <p><strong>Stickmen:</strong> <span id="stickmen">0</span></p>
    <div id="stickman">👨🏿</div>
</div>

<script>
let cotton = 0;
let stickmen = 0;
let stickmanCost = 10; // Anfangspreis
const cottonPerClick = 1;
const cottonPerStickman = 1;
const costMultiplier = 1.15; // Preis steigt um 15% pro Stickman

// Update Anzeige
function updateDisplay() {
    document.getElementById('cotton').textContent = Math.floor(cotton);
    document.getElementById('stickmen').textContent = stickmen;
    document.getElementById('stickmanCost').textContent = Math.floor(stickmanCost);
}

// Klick um Cotton zu sammeln
document.getElementById('collect').addEventListener('click', () => {
    cotton += cottonPerClick;
    updateDisplay();
});

// Stickman kaufen
document.getElementById('buyStickman').addEventListener('click', () => {
    if (cotton >= stickmanCost) {
        cotton -= stickmanCost;
        stickmen += 1;
        stickmanCost *= costMultiplier; // Preis erhöhen
        updateDisplay();
    } else {
        alert("Not enough Cotton, ur farmers can calculate better!");
    }
});

// Automatisch Cotton durch Stickmen sammeln
setInterval(() => {
    cotton += stickmen * cottonPerStickman;
    updateDisplay();
}, 1000); // jede Sekunde

updateDisplay();
</script>

</body>
</html>
